 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Morris Zoleta</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(-45deg, #0f172a, #1e293b, #0ea5e9, #22c55e);
    background-size: 400% 400%;
    animation: bg 10s infinite;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    color: white;
}

@keyframes bg {
    0% {background-position:0%}
    50% {background-position:100%}
    100% {background-position:0%}
}

.card {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 25px;
    width: 340px;
    text-align: center;
    box-shadow: 0 0 40px rgba(0,255,200,0.3);
}

.avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: 3px solid #22c55e;
}

.btn {
    display: block;
    margin: 12px 0;
    padding: 14px;
    border-radius: 12px;
    color: white;
    text-decoration: none;
    font-weight: bold;
    cursor: pointer;
}

.paypal { background: #0070ba; }
.copy { background: #22c55e; }
.form { background: #9333ea; }

.number {
    background: rgba(0,0,0,0.5);
    padding: 10px;
    border-radius: 10px;
}

.qr {
    width: 100%;
    border-radius: 10px;
    margin-top: 10px;
}

.progress {
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    overflow: hidden;
}

.progress-bar {
    width: 30%;
    height: 10px;
    background: linear-gradient(90deg,#22c55e,#0ea5e9);
}

.popup, .donation-popup {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    background: #22c55e;
    padding: 10px 20px;
    border-radius: 10px;
    display: none;
}

.popup { bottom: 20px; }
.donation-popup { top: 20px; background:#0ea5e9; }

</style>
</head>

<body>

<div class="card">

<img src="profile.jpg" class="avatar" onerror="this.style.display='none'">

<h2>Morris Zoleta</h2>
<p>🌍 Support my journey ❤️</p>

<a class="btn paypal" href="https://paypal.me/MorrisZoleta982" target="_blank">
💸 Donate via PayPal
</a>

<!-- GOOGLE FORM BUTTON -->
<a class="btn form"  href="https://docs.google.com/forms/d/e/1FAIpQLSdosfB9Pl25dG42r7jWmKinbeEkghMzcr8GCrrqvMcddF99dg/viewform" target="_blank">
💬 Submit Donation Info
</a>

<div class="number" id="number">+63 928 965 2830</div>
<div class="btn copy" onclick="copyNum()">📋 Copy Maya Number</div>

<img src="maya-qr.jpg" class="qr">

<p>🎯 Goal: ₱1,000</p>
<div class="progress">
<div class="progress-bar"></div>
</div>

</div>

<div class="popup" id="popup">Copied!</div>
<div class="donation-popup" id="donation"></div>

<script>
function copyNum() {
    let text = document.getElementById('number').innerText;
    navigator.clipboard.writeText(text);
    let pop = document.getElementById('popup');
    pop.style.display = 'block';
    setTimeout(()=>pop.style.display='none',2000);
}

const names = ["John","Alex","Maria","David","Chris"];
const amounts = ["$5","$10","$2","$20","$15"];

setInterval(()=>{
    let n = names[Math.floor(Math.random()*names.length)];
    let a = amounts[Math.floor(Math.random()*amounts.length)];
    let d = document.getElementById('donation');
    d.innerText = n + " donated " + a;
    d.style.display = "block";
    setTimeout(()=>d.style.display="none",3000);
},8000);
</script>

</body>
</html>
