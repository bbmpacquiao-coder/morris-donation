 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Morris Zoleta</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Glow background */
body::before {
    content: "";
    position: absolute;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, #22c55e55, transparent);
    top: -100px;
    left: -100px;
    filter: blur(120px);
}

/* Card */
.card {
    width: 350px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
    text-align: center;
    animation: fadeIn 1s ease;
}

/* Avatar */
.avatar {
    width: 80px;
    height: 80px;
    margin: auto;
    border-radius: 50%;
    background: linear-gradient(45deg, #22c55e, #06b6d4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 24px;
}

/* Title */
h1 {
    margin-top: 15px;
    font-size: 22px;
}

.subtitle {
    opacity: 0.7;
    font-size: 14px;
    margin-bottom: 20px;
}

/* Buttons */
.btn {
    display: block;
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}

.paypal {
    background: #0070ba;
    color: white;
}

.maya {
    background: #22c55e;
    color: black;
}

/* Number box */
.number-box {
    background: #020617;
    padding: 10px;
    border-radius: 10px;
    margin-top: 10px;
    font-size: 14px;
}

/* QR */
.qr {
    width: 100%;
    margin-top: 15px;
    border-radius: 10px;
}

/* Form button */
.form-btn {
    background: #9333ea;
    color: white;
}

/* Footer */
.footer {
    margin-top: 15px;
    font-size: 12px;
    opacity: 0.6;
}

/* Animation */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>

</head>
<body>

<div class="card">

    <div class="avatar">MZ</div>

    <h1>Morris Zoleta</h1>
    <div class="subtitle">Support my journey ❤️</div>

    <!-- PAYPAL -->
    <a href="https://www.paypal.com/paypalme/MorrisZoleta982" target="_blank">
        <button class="btn paypal">💳 Donate via PayPal</button>
    </a>

    <!-- MAYA -->
    <div class="number-box" id="number">+63 928 965 2830</div>
    <button class="btn maya" onclick="copyNumber()">📱 Copy Maya Number</button>

    <!-- QR -->
    <img src="maya-qr.jpg" class="qr">

    <!-- GOOGLE FORM -->
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSdosfB9Pl25dG42r7jWmKinbeEkghMzcr8GCrrqvMcddF99dg/viewform" target="_blank">
        <button class="btn form-btn">📝 Send Message / Support</button>
    </a>

    <div class="footer">Thank you for your support 🙏</div>

</div>

<script>
function copyNumber() {
    const text = document.getElementById("number").innerText;
    navigator.clipboard.writeText(text);
    alert("Copied: " + text);
}
</script>

</body>
</html>
