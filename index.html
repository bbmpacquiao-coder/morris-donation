<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Morris Zoleta</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.card {
    background: #1e293b;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    width: 320px;
    box-shadow: 0 0 30px rgba(0,255,150,0.2);
}
.avatar {
    width: 80px;
    height: 80px;
    background: linear-gradient(45deg,#22c55e,#06b6d4);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 30px;
    margin: auto;
}
.btn {
    display: block;
    margin: 10px 0;
    padding: 12px;
    border-radius: 10px;
    text-decoration: none;
    color: white;
    font-weight: bold;
}
.paypal { background: #0070ba; }
.maya { background: #00c853; }
.crypto { background: #f59e0b; }
.qr {
    width: 100%;
    border-radius: 10px;
    margin-top: 10px;
}
</style>

</head>

<body>

<div class="card">
    <div class="avatar">MZ</div>

    <h2>Morris Zoleta</h2>
    <p>🌍 Support me worldwide ❤️</p>

    <!-- PAYPAL -->
    <a class="btn paypal" href="https://paypal.me/MorrisZoleta982" target="_blank">
        💸 Donate via PayPal (Global)
    </a>

    <!-- MAYA -->
    <p>📱 Maya (Philippines)</p>
    <img src="maya-qr.jpg" class="qr">

    <!-- CRYPTO -->
    <p>🪙 Crypto (International)</p>
    <div class="btn crypto">BTC: your-btc-address</div>
    <div class="btn crypto">USDT: your-usdt-address</div>

    <p style="font-size:12px;opacity:0.7;">
        Accepting USD, PHP & Crypto worldwide 🌍
    </p>
</div>

</body>
</html>
