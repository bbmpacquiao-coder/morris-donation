<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Morris Zoleta</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 30px;
    width: 320px;
    text-align: center;
    box-shadow: 0 0 40px rgba(0,255,200,0.2);
    animation: fadeIn 1s ease;
}

/* Avatar */
.avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00ffcc, #00aaff);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: bold;
    margin: auto;
}

/* Text */
h1 {
    margin: 15px 0 5px;
    font-size: 22px;
}

p {
    opacity: 0.7;
    font-size: 14px;
}

/* Number box */
.number {
    background: #020617;
    padding: 10px;
    border-radius: 10px;
    margin: 15px 0;
    font-size: 14px;
}

/* Buttons */
button {
    border: none;
    padding: 10px;
    width: 100%;
    border-radius: 10px;
    margin-top: 10px;
    cursor: pointer;
    font-weight: bold;
}

.copy {
    background: #00ff99;
}

.paypal {
    background: #0070ba;
    color: white;
}

.qr {
    width: 200px;
    margin-top: 15px;
    border-radius: 10px;
    transition: 0.3s;
}

.qr:hover {
    transform: scale(1.1);
}

/* Popup */
.popup {
    position: fixed;
    bottom: 20px;
    background: #00ff99;
    color: black;
    padding: 10px 20px;
    border-radius: 10px;
    display: none;
}

/* Animation */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="card">

    <div class="avatar">MZ</div>

    <h1>Morris Zoleta</h1>
    <p>Support my journey ❤️</p>

    <h3>💸 Maya</h3>

    <div class="number" id="number">
        +63 928 965 2830
    </div>

    <button class="copy" onclick="copyNumber()">Copy Number</button>

    <!-- PayPal Button -->
    <a href="https://www.paypal.com/paypalme/MorrisZoleta982" target="_blank">
        <button class="paypal">Donate via PayPal</button>
    </a>

    <!-- QR -->
    <img src="maya-qr.jpg" class="qr">

</div>

<div class="popup" id="popup">Copied!</div>

<script>
function copyNumber() {
    const text = document.getElementById("number").innerText;
    navigator.clipboard.writeText(text);

    const popup = document.getElementById("popup");
    popup.style.display = "block";

    setTimeout(() => {
        popup.style.display = "none";
    }, 2000);
}
</script>

</body>
</html>
